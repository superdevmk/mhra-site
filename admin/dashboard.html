<!DOCTYPE html>
<html lang="en" data-require-admin="true">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>MHRA Admin Dashboard</title>
  <link href="../assets/css/style.css" rel="stylesheet" />
</head>
<body class="admin-page">
  <header class="admin-header">
    <div class="admin-header__inner">
      <a href="dashboard.html" class="admin-header__brand">MHRA Admin</a>
      <nav class="admin-header__nav">
        <a href="../mk/index.html">View site</a>
        <a href="#" id="admin-signout">Sign out</a>
      </nav>
    </div>
  </header>
  <main class="section">
    <div class="section-shell section-shell--compact">
      <h1 class="section__title">Admin Dashboard</h1>
      <p class="section__subtitle">Manage MHRA website content</p>
      <div class="admin-dashboard-grid">
        <a class="admin-dashboard-card" href="informative.html">Informative content</a>
        <a class="admin-dashboard-card" href="events.html">HR events</a>
        <a class="admin-dashboard-card" href="conferences.html">Yearly conferences</a>
      </div>
    </div>
  </main>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="../assets/js/supabaseClient.js"></script>
  <script src="../assets/js/auth.js"></script>
  <script src="../assets/js/adminGuard.js"></script>
  <script>
    document.getElementById("admin-signout").addEventListener("click", async (e) => {
      e.preventDefault();
      await signOut();
      location.href = "login.html";
    });
  </script>
</body>
</html>
