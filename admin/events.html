<!DOCTYPE html>
<html lang="en" data-require-admin="true">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Admin – HR Events</title>
  <link href="../assets/css/style.css" rel="stylesheet" />
  <link href="https://cdn.jsdelivr.net/npm/quill@2.0.2/dist/quill.snow.css" rel="stylesheet" />
</head>
<body class="admin-page">
  <header class="admin-header">
    <div class="admin-header__inner">
      <a href="dashboard.html" class="admin-header__brand">MHRA Admin</a>
      <nav class="admin-header__nav">
        <a href="informative.html">Informative</a>
        <a href="events.html">Events</a>
        <a href="conferences.html">Conferences</a>
        <a href="#" id="admin-signout">Sign out</a>
      </nav>
    </div>
  </header>
  <main class="section">
    <div class="section-shell section-shell--compact">
      <h1 class="section__title" id="admin-page-title">HR Events</h1>
      <p class="section__subtitle" id="form-mode-label">Create new</p>

      <form id="admin-form" class="form form--stack admin-form">
        <div class="form__row-grid">
          <div class="form__field">
            <label>Language</label>
            <select name="language" required>
              <option value="mk">MK</option>
              <option value="en">EN</option>
            </select>
          </div>
          <div class="form__field form__field--inline">
            <label><input type="checkbox" name="published" checked /> Published</label>
          </div>
        </div>
        <div class="form__row-grid">
          <div class="form__field">
            <label>Event date</label>
            <input type="date" name="event_date" />
          </div>
          <div class="form__field">
            <label>Location</label>
            <input type="text" name="location" />
          </div>
        </div>
        <div class="form__field">
          <label>Title</label>
          <input type="text" name="title" required />
        </div>
        <div class="form__field">
          <label>Subtitle</label>
          <input type="text" name="subtitle" />
        </div>
        <div class="form__field">
          <label>Content</label>
          <p class="section__subtitle" style="margin: 0 0 0.5rem;">Use the toolbar for headings, links, images, lists, and embedded video (YouTube/Vimeo).</p>
          <div id="admin-editor" class="rich-editor"></div>
          <input type="hidden" id="admin-body-html" name="body_html" />
        </div>
        <div class="form__field">
          <label>Gallery images</label>
          <input type="file" id="admin-files" multiple accept="image/*" />
        </div>
        <div class="form__actions">
          <button type="submit" class="btn btn--primary">Save</button>
          <button type="button" class="btn btn--outline" id="admin-reset-btn">Reset</button>
        </div>
      </form>

      <hr class="section-divider" />

      <div class="form__field">
        <label>Filter by language</label>
        <select id="admin-language-filter">
          <option value="mk">MK</option>
          <option value="en">EN</option>
        </select>
      </div>
      <div class="admin-table-wrap">
        <table class="table" id="admin-table">
          <thead>
            <tr><th>Title</th><th>Lang</th><th>Published</th><th>Created</th><th>Actions</th></tr>
          </thead>
          <tbody></tbody>
        </table>
      </div>
    </div>
  </main>
  <script>window.MHRA_ADMIN_CONFIG = { table: "hr_events", bucket: "events-assets", title: "HR Events" };</script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="https://cdn.jsdelivr.net/npm/quill@2.0.2/dist/quill.js"></script>
  <script src="../assets/js/supabaseClient.js"></script>
  <script src="../assets/js/utils.js"></script>
  <script src="../assets/js/renderContent.js"></script>
  <script src="../assets/js/auth.js"></script>
  <script src="../assets/js/richEditor.js"></script>
  <script src="../assets/js/adminGuard.js"></script>
  <script src="../assets/js/contentAdmin.js"></script>
</body>
</html>
